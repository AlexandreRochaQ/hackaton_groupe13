x-airflow-common: &airflow-common
  image: apache/airflow:2.9.1
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: "46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLt0nfd5dI="
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__WEBSERVER__SECRET_KEY: "docuflow_secret_2024"
    AIRFLOW__API__AUTH_BACKENDS: "airflow.api.auth.backend.basic_auth"
    _PIP_ADDITIONAL_REQUIREMENTS: "pymongo dnspython requests"
    MONGO_URI: ${MONGO_URI}
    MONGO_DB: ${MONGO_DB}
    OCR_SERVICE_URL: http://ocr-service:5001
    NER_SERVICE_URL: http://ner-service:8001
    API_BACKEND_URL: http://api-backend:3001
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
    - uploads-data:/opt/airflow/uploads
  depends_on:
    postgres:
      condition: service_healthy
  networks:
    - docuflow-net

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
    networks:
      - docuflow-net

  ocr-service:
    build:
      context: ./ocr-service
      dockerfile: Dockerfile
    ports:
      - "5001:5001"
    volumes:
      - uploads-data:/app/uploads
    environment:
      MONGO_URI: ${MONGO_URI}
      MONGO_DB: ${MONGO_DB}
      OLLAMA_URL: http://ollama:11434
    networks:
      - docuflow-net

  ner-service:
    build:
      context: ./services/ner-service
      dockerfile: Dockerfile
    ports:
      - "5002:8001"
    environment:
      MONGO_URI: ${MONGO_URI}
      MONGO_DB: ${MONGO_DB}
    networks:
      - docuflow-net

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    environment:
      OLLAMA_KEEP_ALIVE: "24h"
    networks:
      - docuflow-net

  airflow-init:
    <<: *airflow-common
    command: bash -c "airflow db migrate && airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@docuflow.io"
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped


  api-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    volumes:
      - uploads-data:/app/uploads
      - /app/node_modules
    environment:
      PORT: 3001
      MONGO_URI: ${MONGO_URI}
      MONGO_DB: ${MONGO_DB}
      OCR_SERVICE_URL: http://ocr-service:5001
      NER_SERVICE_URL: http://ner-service:8001
      OLLAMA_URL: http://ollama:11434
      AIRFLOW_URL: http://airflow-webserver:8080
      AIRFLOW_USER: admin
      AIRFLOW_PASS: admin
      USE_MOCK_SERVICES: "false"
    depends_on:
      - ocr-service
      - ner-service
    networks:
      - docuflow-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:3001
    ports:
      - "3000:80"
    depends_on:
      - api-backend
    networks:
      - docuflow-net

volumes:
  postgres-data:
  uploads-data:
  ollama-data:

networks:
  docuflow-net:
    driver: bridge